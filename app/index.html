<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="./css/main.css">
    <script src="https://kit.fontawesome.com/fe0dc59af9.js" crossorigin="anonymous"></script>
    <link rel="icon" href="./img/ygo.png" type="image/x-icon">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Playwrite+DK+Uloopet:wght@100..400&display=swap" rel="stylesheet">
    <title>Cartas - Yu Gi Oh</title>
</head>
<body>
  <header id="header">
    <nav class="menu">
        <div class="logo">
            <a href="#" class="img-principal"><img src="./img/kuriboh.png" alt="kuriboh">Proyecto Yu Gi OH</a>
            <a href="#" class="btn-menu" id="btn-menu"><i class="icono fa fa-bars" aria-hidden="true"></i></a>
        </div>
        <div class="enlaces" id="enlaces">
            <a href="index.html" title="Cartas"><img src="./img/card-games.png" alt=""> Buscador de Cartas</a>
            <a href="vision.html" title="Descripción del proyecto"><img src="./img/ojo.png" alt="" aria-hidden="true" height="20px"> Objetivo del Proyecto</a>
            <button aria-label="Cerrar Sesion" type="submit" class="cerrar" id="cerrar" title="Cerrar Sesión">
                <i class="fa-solid fa-right-from-bracket fa-rotate-180"></i>
            </button>
        </div>
    </nav> 
  </header>
    <div class="container">
              <main id="contenido_JC" class="contenido_JC">
            <h1 class="titulo-buscador_JC">Bienvenidos al Buscador de Cartas Yu-Gi-Oh</h1>
            <div class="contenedor_JC">
                <div id="buscar_JC" class="buscar_JC">
                    
                    <p class="fav_JC">Esriba la carta deseada</p>
                    <form action="#" id="formulario-buscar_JC">
                        <div class="buscar">
                          
                            <input type="text" id="carta" placeholder="Nombre de la Carta" required>
                            <div class="btn">
                                <input type="button" id="boton-buscar_JC" class="boton-buscar" >
                            </div>
                        </div>
                        <div class="contenidoAnimacion_JC">
                        <div class="sk-circle" >
                            <div class="sk-circle1 sk-child"></div>
                            <div class="sk-circle2 sk-child"></div>
                            <div class="sk-circle3 sk-child"></div>
                            <div class="sk-circle4 sk-child"></div>
                            <div class="sk-circle5 sk-child"></div>
                            <div class="sk-circle6 sk-child"></div>
                            <div class="sk-circle7 sk-child"></div>
                            <div class="sk-circle8 sk-child"></div>
                            <div class="sk-circle9 sk-child"></div>
                            <div class="sk-circle10 sk-child"></div>
                            <div class="sk-circle11 sk-child"></div>
                            <div class="sk-circle12 sk-child"></div>
                          </div>
                        </div>  
                        
                    </form>
                   
                </div>
                <div id="mensajes_JC"></div>
                <div class="letra-resultado_JC">
                    
                    <div id="resultado_JC"></div>
                </div>
            </div>
        </main>
    </div>
    <section class="filtroBotones_JC">
        <h1 class="titulo_JC"><img src="./img/dark.gif" height="50px" width="50px" alt=""> Búsqueda de Cartas Yu-Gi-Oh <img src="./img/dark.gif" width="50px" height="50px" alt=""></h1>
        <div class="filtros">
        <button class="cartasMonstruos_JC" id="boton-monstruos_JC">Monstruos <img src="./img/dragon.png" alt="monstruo"></button>
        <button class="trampa_JC" id="boton-trampas_JC"><strong>Trampa</strong> <img src="./img/spider-web.png" alt="spider"></button>
        <button class="magica_JC" id="boton-hechizos_JC">Mágica <img src="./img/tarot.png" alt="magica"></button>
        <button class="token_JC" id="boton-tokens_JC"><strong> Token </strong> <img src="./img/token.png" alt="token"></button>
        <button class="todas_JC" id="tipoTodas_JC">Todas <img src="./img/card-game.png" alt="carta"></button>
        </div>
        <div class="filtro_JC" id="filtroSec_JC"></div>
    </section>

    <footer>
        <span>
            Profesor <strong>Ronald Palacios</strong> | Curso: Programación 3 &copy;<span id="actual"></span><br>
            Proyecto: Yu Gi OH <img src="./img/hacker.png" alt="Hacker"> | Alumno: <strong>Jean Coffi</strong>
        </span>
        <script>
            document.getElementById("actual").innerHTML = new Date().getFullYear();
        </script>
    </footer>
    

  

    <dialog id="sesionCerrada" class="cerradasesion">
        <h1>Cerrando Sesión</h1>
        <div class="sk-cube-grid">
            <div class="sk-cube sk-cube1"></div>
            <div class="sk-cube sk-cube2"></div>
            <div class="sk-cube sk-cube3"></div>
            <div class="sk-cube sk-cube4"></div>
            <div class="sk-cube sk-cube5"></div>
            <div class="sk-cube sk-cube6"></div>
            <div class="sk-cube sk-cube7"></div>
            <div class="sk-cube sk-cube8"></div>
            <div class="sk-cube sk-cube9"></div>
        </div>
    </dialog>
    

  

    <dialog id="cartaborrada_JC">
        <h1>Carta eliminada correctamente</h1>
      </dialog>
      


  <script src="./js/js_Menu/headroom.min.js"></script>
  <script src="./js/js_Menu/jquery.min.js"></script>
  <script src="./js/js_Menu/menu.js"></script>
  <script src="./js/main.js" type="module"></script>
</body>
</html>
